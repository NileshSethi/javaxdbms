<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GamerSync CRUD App</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; }
        .form-group { display: flex; flex-direction: column; margin-bottom: 10px; }
        label { font-weight: bold; margin-bottom: 5px; }
        input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .btn-group { margin-top: 15px; display: flex; gap: 10px; }
        button { padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; color: white; font-weight: bold; }
        .btn-add { background-color: #28a745; }
        .btn-update { background-color: #ffc107; color: #000; }
        .btn-delete { background-color: #dc3545; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #007bff; color: white; }
        .action-btns button { padding: 5px 10px; margin-right: 5px; font-size: 12px; }
        #message { margin-top: 10px; padding: 10px; border-radius: 4px; display: none; }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

<div class="container">
    <h1>GamerSync Customer Management</h1>
    
    <div id="message"></div>

    <form id="customerForm">
        <div class="form-group">
            <label for="custId">Customer ID:</label>
            <input type="number" id="custId" required>
        </div>
        <div class="form-group">
            <label for="name">Name:</label>
            <input type="text" id="name" required>
        </div>
        <div class="form-group">
            <label for="phone">Phone:</label>
            <input type="text" id="phone" required>
        </div>
        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" required>
        </div>
        <div class="form-group">
            <label for="registeredDate">Registered Date (YYYY-MM-DD):</label>
            <input type="text" id="registeredDate" placeholder="2024-01-01" required>
        </div>
        
        <div class="btn-group">
            <button type="submit" class="btn-add" id="addBtn">Add Customer</button>
            <button type="button" class="btn-update" id="updateBtn" style="display:none;" onclick="updateCustomer()">Update Customer</button>
            <button type="button" onclick="resetForm()" style="background-color: #6c757d;">Clear Form</button>
        </div>
    </form>

    <hr>

    <h2>Customer List</h2>
    <button onclick="loadCustomers()" style="background-color: #17a2b8;">Refresh List</button>
    
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Phone</th>
                <th>Email</th>
                <th>Date</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="customerTableBody">
            <!-- Data will be populated here -->
        </tbody>
    </table>
</div>

<script>
    const API_BASE = "http://localhost:8080/customer";

    // Load initial data
    window.onload = loadCustomers;

    document.getElementById('customerForm').addEventListener('submit', function(e) {
        e.preventDefault();
        addCustomer();
    });

    function showMessage(msg, isError = false) {
        const msgDiv = document.getElementById('message');
        msgDiv.textContent = msg;
        msgDiv.className = isError ? 'error' : 'success';
        msgDiv.style.display = 'block';
        setTimeout(() => msgDiv.style.display = 'none', 3000);
    }

    function getFormData() {
        const params = new URLSearchParams();
        params.append('custId', document.getElementById('custId').value);
        params.append('name', document.getElementById('name').value);
        params.append('phone', document.getElementById('phone').value);
        params.append('email', document.getElementById('email').value);
        params.append('registeredDate', document.getElementById('registeredDate').value);
        return params;
    }

    function resetForm() {
        document.getElementById('customerForm').reset();
        document.getElementById('custId').readOnly = false;
        document.getElementById('addBtn').style.display = 'block';
        document.getElementById('updateBtn').style.display = 'none';
    }

    function addCustomer() {
        fetch(`${API_BASE}/add`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: getFormData().toString()
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                showMessage('Customer added successfully!');
                resetForm();
                loadCustomers();
            } else {
                showMessage(data.message, true);
            }
        })
        .catch(err => showMessage('Failed to connect to API', true));
    }

    function loadCustomers() {
        fetch(`${API_BASE}/view`)
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                const tbody = document.getElementById('customerTableBody');
                tbody.innerHTML = '';
                data.data.forEach(c => {
                    const row = `<tr>
                        <td>${c.custId}</td>
                        <td>${c.name}</td>
                        <td>${c.phone}</td>
                        <td>${c.email}</td>
                        <td>${c.registeredDate}</td>
                        <td class="action-btns">
                            <button onclick="editCustomer(${c.custId}, '${c.name.replace(/'/g, "\\'")}', '${c.phone}', '${c.email}', '${c.registeredDate}')" style="background-color: #ffc107; color: black;">Edit</button>
                            <button onclick="deleteCustomer(${c.custId})" class="btn-delete">Delete</button>
                        </td>
                    </tr>`;
                    tbody.innerHTML += row;
                });
            }
        })
        .catch(err => console.error('Error loading customers:', err));
    }

    function editCustomer(id, name, phone, email, date) {
        document.getElementById('custId').value = id;
        document.getElementById('custId').readOnly = true; // Don't allow changing ID during update
        document.getElementById('name').value = name;
        document.getElementById('phone').value = phone;
        document.getElementById('email').value = email;
        document.getElementById('registeredDate').value = date;

        document.getElementById('addBtn').style.display = 'none';
        document.getElementById('updateBtn').style.display = 'block';
        window.scrollTo(0, 0);
    }

    function updateCustomer() {
        fetch(`${API_BASE}/update`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: getFormData().toString()
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                showMessage('Customer updated successfully!');
                resetForm();
                loadCustomers();
            } else {
                showMessage(data.message, true);
            }
        })
        .catch(err => showMessage('Failed to update customer', true));
    }

    function deleteCustomer(id) {
        if (!confirm('Are you sure you want to delete this customer?')) return;

        const params = new URLSearchParams();
        params.append('custId', id);

        fetch(`${API_BASE}/delete`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: params.toString()
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                showMessage('Customer deleted successfully!');
                loadCustomers();
            } else {
                showMessage(data.message, true);
            }
        })
        .catch(err => showMessage('Failed to delete customer', true));
    }
</script>

</body>
</html>
