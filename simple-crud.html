<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GamerSync CRUD Console</title>
  <style>
    :root {
      --bg: #f4f6fb;
      --card: #ffffff;
      --text: #1f2933;
      --muted: #6b7280;
      --primary: #0d6efd;
      --success: #198754;
      --danger: #dc2626;
      --border: #d1d5db;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 24px;
    }

    .container {
      max-width: 920px;
      margin: 0 auto;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 24px;
    }

    p,
    .hint {
      color: var(--muted);
      margin-top: 4px;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 10px 0;
      flex-wrap: wrap;
    }

    .row label {
      width: 180px;
      font-weight: 600;
    }

    .field-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 14px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-weight: 600;
    }

    input,
    select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px;
      font-size: 14px;
      box-sizing: border-box;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 18px 0;
    }

    button {
      border: 0;
      border-radius: 6px;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      color: #fff;
      background: var(--primary);
    }

    button.read {
      background: #6c757d;
    }

    button.update {
      background: #fd7e14;
    }

    button.delete {
      background: var(--danger);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .status {
      margin: 8px 0 12px;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #f8fafc;
      color: #374151;
      font-size: 14px;
    }

    .status.ok {
      border-color: #b7e4c7;
      background: #f0fff4;
      color: #146c43;
    }

    .status.error {
      border-color: #f5c2c7;
      background: #fff5f5;
      color: #842029;
    }

    .result-title {
      margin: 12px 0 8px;
      font-weight: 700;
    }

    #result {
      width: 100%;
      min-height: 130px;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px;
      background: #fafafa;
      font-family: Consolas, monospace;
      font-size: 13px;
      resize: vertical;
      box-sizing: border-box;
    }

    .table-wrap {
      margin-top: 14px;
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 700px;
    }

    thead {
      background: #eef2f7;
    }

    th,
    td {
      padding: 10px;
      border-bottom: 1px solid #e9ecef;
      text-align: left;
      font-size: 13px;
      white-space: nowrap;
    }

    tbody tr {
      cursor: pointer;
    }

    tbody tr:hover {
      background: #f8fbff;
    }

    @media (max-width: 600px) {
      .row {
        align-items: flex-start;
      }

      .row label {
        width: 100%;
      }

      .field-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>GamerSync CRUD Console</h1>
    <p>Single HTML file connected to Java HTTP API + MySQL.</p>

    <div class="row">
      <label for="apiBase">API Base URL</label>
      <input id="apiBase" type="text" value="http://localhost:8080" placeholder="http://localhost:8080">
    </div>

    <div class="row">
      <label for="tableSelect">Table Selector</label>
      <select id="tableSelect"></select>
    </div>

    <div id="formArea" class="field-grid"></div>
    <p id="formHint" class="hint"></p>

    <div class="buttons">
      <button id="createBtn">Create</button>
      <button id="readBtn" class="read">Read</button>
      <button id="updateBtn" class="update">Update</button>
      <button id="deleteBtn" class="delete">Delete</button>
    </div>

    <div id="status" class="status">Ready.</div>

    <div class="result-title">Result Box</div>
    <textarea id="result" readonly></textarea>

    <div class="result-title">Data Table</div>
    <div class="table-wrap">
      <table id="dataTable">
        <thead></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <script>
    const TABLE_CONFIG = {
      CUSTOMER: {
        label: "CUSTOMER",
        idKey: "custId",
        fields: [
          { key: "custId", label: "Customer ID", type: "number", required: true },
          { key: "name", label: "Name", type: "text", required: true },
          { key: "phone", label: "Phone", type: "text", required: true },
          { key: "email", label: "Email", type: "email", required: true },
          { key: "registeredDate", label: "Registered Date", type: "date", required: true }
        ],
        endpoints: {
          create: "/customer/add",
          read: "/customer/view",
          update: "/customer/update",
          delete: "/customer/delete"
        }
      }
    };

    const TABLE_OPTIONS = [
      "CUSTOMER",
      "GAMING_SESSION",
      "PAYMENT",
      "FOOD_ORDER",
      "MEMBERSHIP"
    ];

    const state = {
      selectedTable: "CUSTOMER",
      inputs: {}
    };

    const tableSelectEl = document.getElementById("tableSelect");
    const formAreaEl = document.getElementById("formArea");
    const formHintEl = document.getElementById("formHint");
    const apiBaseEl = document.getElementById("apiBase");
    const resultEl = document.getElementById("result");
    const statusEl = document.getElementById("status");
    const dataTableEl = document.getElementById("dataTable");
    const dataHeadEl = dataTableEl.querySelector("thead");
    const dataBodyEl = dataTableEl.querySelector("tbody");

    const createBtn = document.getElementById("createBtn");
    const readBtn = document.getElementById("readBtn");
    const updateBtn = document.getElementById("updateBtn");
    const deleteBtn = document.getElementById("deleteBtn");

    function init() {
      renderTableSelector();
      bindEvents();
      renderForm();
      readRecords();
    }

    function renderTableSelector() {
      tableSelectEl.innerHTML = "";

      TABLE_OPTIONS.forEach(tableName => {
        const option = document.createElement("option");
        option.value = tableName;

        if (TABLE_CONFIG[tableName]) {
          option.textContent = tableName;
        } else {
          option.textContent = tableName + " (Phase 5)";
        }

        tableSelectEl.appendChild(option);
      });

      tableSelectEl.value = state.selectedTable;
    }

    function bindEvents() {
      tableSelectEl.addEventListener("change", () => {
        state.selectedTable = tableSelectEl.value;
        renderForm();
        clearTable();
        resultEl.value = "";
      });

      createBtn.addEventListener("click", createRecord);
      readBtn.addEventListener("click", readRecords);
      updateBtn.addEventListener("click", updateRecord);
      deleteBtn.addEventListener("click", deleteRecord);
    }

    function renderForm() {
      const config = TABLE_CONFIG[state.selectedTable];
      formAreaEl.innerHTML = "";
      state.inputs = {};

      const supported = Boolean(config);
      setCrudEnabled(supported);

      if (!supported) {
        formHintEl.textContent = "Backend endpoints for this table will be added in Phase 5.";
        setStatus("Select CUSTOMER for active API testing.", false);
        return;
      }

      formHintEl.textContent = "Click a row in Data Table to auto-fill form for update/delete.";

      config.fields.forEach(field => {
        const wrapper = document.createElement("div");
        wrapper.className = "field";

        const label = document.createElement("label");
        label.htmlFor = field.key;
        label.textContent = field.label;

        const input = document.createElement("input");
        input.id = field.key;
        input.name = field.key;
        input.type = field.type;
        input.required = field.required;
        input.placeholder = field.label;

        wrapper.appendChild(label);
        wrapper.appendChild(input);

        formAreaEl.appendChild(wrapper);
        state.inputs[field.key] = input;
      });
    }

    function setCrudEnabled(enabled) {
      createBtn.disabled = !enabled;
      readBtn.disabled = !enabled;
      updateBtn.disabled = !enabled;
      deleteBtn.disabled = !enabled;
    }

    function getConfig() {
      const config = TABLE_CONFIG[state.selectedTable];
      if (!config) {
        throw new Error("Selected table is not supported in this phase.");
      }
      return config;
    }

    function collectPayload(requireAllFields) {
      const config = getConfig();
      const payload = {};

      config.fields.forEach(field => {
        const value = (state.inputs[field.key]?.value || "").trim();

        if (requireAllFields && field.required && !value) {
          throw new Error(field.label + " is required.");
        }

        if (value) {
          payload[field.key] = value;
        }
      });

      return payload;
    }

    async function requestApi(method, endpointPath, payload) {
      const apiBase = apiBaseEl.value.trim().replace(/\/$/, "");
      if (!apiBase) {
        throw new Error("API Base URL is required.");
      }

      const url = new URL(apiBase + endpointPath);
      const options = { method, headers: {} };

      if (method === "GET") {
        Object.entries(payload || {}).forEach(([key, value]) => {
          if (value !== "" && value !== undefined && value !== null) {
            url.searchParams.set(key, value);
          }
        });
      } else {
        options.headers["Content-Type"] = "application/x-www-form-urlencoded;charset=UTF-8";
        options.body = new URLSearchParams(payload || {}).toString();
      }

      const response = await fetch(url.toString(), options);
      const text = await response.text();

      let json;
      try {
        json = JSON.parse(text);
      } catch (parseError) {
        throw new Error("Invalid JSON response: " + text);
      }

      if (!response.ok || json.success === false) {
        throw new Error(json.message || ("Request failed with status " + response.status));
      }

      return json;
    }

    function normalizeRows(data) {
      if (Array.isArray(data)) {
        return data;
      }
      if (data && typeof data === "object") {
        return [data];
      }
      return [];
    }

    function renderData(rows) {
      const config = getConfig();

      dataHeadEl.innerHTML = "";
      dataBodyEl.innerHTML = "";

      const headRow = document.createElement("tr");
      config.fields.forEach(field => {
        const th = document.createElement("th");
        th.textContent = field.label;
        headRow.appendChild(th);
      });
      dataHeadEl.appendChild(headRow);

      if (!rows.length) {
        const row = document.createElement("tr");
        const cell = document.createElement("td");
        cell.colSpan = config.fields.length;
        cell.textContent = "No data found.";
        row.appendChild(cell);
        dataBodyEl.appendChild(row);
        return;
      }

      rows.forEach(record => {
        const row = document.createElement("tr");
        row.dataset.record = JSON.stringify(record);

        config.fields.forEach(field => {
          const td = document.createElement("td");
          td.textContent = record[field.key] ?? "";
          row.appendChild(td);
        });

        row.addEventListener("click", () => fillForm(record));
        dataBodyEl.appendChild(row);
      });
    }

    function clearTable() {
      dataHeadEl.innerHTML = "";
      dataBodyEl.innerHTML = "";
    }

    function fillForm(record) {
      const config = getConfig();
      config.fields.forEach(field => {
        if (state.inputs[field.key]) {
          state.inputs[field.key].value = record[field.key] ?? "";
        }
      });
    }

    function setStatus(message, isError) {
      statusEl.textContent = message;
      statusEl.className = "status " + (isError ? "error" : "ok");
    }

    function showResult(title, payload) {
      resultEl.value = title + "\n\n" + JSON.stringify(payload, null, 2);
    }

    async function createRecord() {
      try {
        const config = getConfig();
        const payload = collectPayload(true);
        const result = await requestApi("POST", config.endpoints.create, payload);
        setStatus("Create successful.", false);
        showResult("Create Response", result);
        await readRecords();
      } catch (error) {
        setStatus("Create failed: " + error.message, true);
      }
    }

    async function readRecords() {
      try {
        const config = getConfig();
        const idValue = (state.inputs[config.idKey]?.value || "").trim();
        const payload = {};

        if (idValue) {
          payload[config.idKey] = idValue;
        }

        const result = await requestApi("GET", config.endpoints.read, payload);
        const rows = normalizeRows(result.data);

        renderData(rows);
        setStatus("Read successful. Rows: " + rows.length, false);
        showResult("Read Response", result);
      } catch (error) {
        renderData([]);
        setStatus("Read failed: " + error.message, true);
        showResult("Read Error", { message: error.message });
      }
    }

    async function updateRecord() {
      try {
        const config = getConfig();
        const payload = collectPayload(true);
        const result = await requestApi("POST", config.endpoints.update, payload);
        setStatus("Update successful.", false);
        showResult("Update Response", result);
        await readRecords();
      } catch (error) {
        setStatus("Update failed: " + error.message, true);
      }
    }

    async function deleteRecord() {
      try {
        const config = getConfig();
        const idValue = (state.inputs[config.idKey]?.value || "").trim();
        if (!idValue) {
          throw new Error("Enter " + config.idKey + " before delete.");
        }

        const payload = {};
        payload[config.idKey] = idValue;

        const result = await requestApi("POST", config.endpoints.delete, payload);
        setStatus("Delete successful.", false);
        showResult("Delete Response", result);

        Object.values(state.inputs).forEach(input => {
          input.value = "";
        });

        await readRecords();
      } catch (error) {
        setStatus("Delete failed: " + error.message, true);
      }
    }

    init();
  </script>
</body>
</html>
